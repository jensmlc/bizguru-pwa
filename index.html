<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0A0A0A">
    <title>BizGuru Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400,500,700,800,900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <div class="container">
        <header>
            <div>
                <h1 style="display:flex;align-items:center;gap:10px;">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
                    BizGuru Dashboard
                </h1>
                <p class="header-subtitle">Projects • Research • Action Items (Powered by OpenClaw)</p>
            </div>
            <div class="header-buttons">
                <button onclick="toggleBriefing()" class="touch-target">☀️ Briefing</button>
                <button class="secondary touch-target" onclick="toggleDarkMode()">🌙 Theme</button>
                <button class="secondary touch-target" onclick="requestPushPermission()">🔔 Notify</button>
            </div>
        </header>

        <div class="focus-zone">
            <div class="focus-zone-header">
                <span class="focus-zone-title">⚡ Today's Focus</span>
                <span style="font-size: 12px; color: var(--text-muted);">Items needing action</span>
            </div>
            <div class="focus-grid" id="focusGrid"></div>
        </div>

        <div class="briefing-panel active" id="briefingPanel">
            <h3>
                ☀️ Morning Briefing
                <span style="flex:1"></span>
                <button class="briefing-collapse-btn touch-target" onclick="toggleBriefing()">▲ collapse</button>
            </h3>
            <div id="briefingContent"></div>
        </div>

        <div class="stats" id="statsContainer"></div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" class="touch-target" placeholder="Search... (Cmd+K)" autocomplete="off" oninput="applyFilters()">
            </div>
            <div class="filter-group" id="filterGroup">
                <button class="filter-btn active touch-target" data-filter="all" onclick="filterByCategory(this)">All</button>
                <button class="filter-btn touch-target" data-filter="BizGuru" onclick="filterByCategory(this)">BizGuru</button>
                <button class="filter-btn touch-target" data-filter="OpenClaw" onclick="filterByCategory(this)">OpenClaw</button>
                <button class="filter-btn touch-target" data-filter="Marketing" onclick="filterByCategory(this)">Marketing</button>
                <button class="filter-btn touch-target" data-filter="Setup" onclick="filterByCategory(this)">Setup</button>
                <div style="width:1px; height:24px; background:var(--border); margin:0 8px;"></div>
                <button class="filter-btn touch-target" id="hideCompleteBtn" onclick="toggleHideComplete()">Hide Complete</button>
            </div>
        </div>

        <div id="projectsContainer" class="projects-grid"></div>

        <footer>
            Showing <span id="projectCount">0</span> projects
        </footer>
    </div>

    <!-- Mobile Bottom Bar -->
    <div class="bottom-bar">
        <button onclick="toggleBriefing()" class="bottom-bar-btn">☀️ Briefing</button>
        <button onclick="openCmdPalette()" class="bottom-bar-btn">🔍 Search</button>
        <button onclick="toggleDarkMode()" class="bottom-bar-btn">🌙 Theme</button>
    </div>

    <!-- Bottom Sheet -->
    <div class="sheet-overlay" id="sheetOverlay" onclick="closeDetails(event)"></div>
    <div class="bottom-sheet" id="detailsSheet">
        <div class="sheet-drag-handle"></div>
        <div id="sheetContent"></div>
    </div>

    <!-- Cmd+K Palette -->
    <div class="cmd-palette-overlay" id="cmdPaletteOverlay" onclick="closeCmdPalette(event)">
        <div class="cmd-palette" onclick="event.stopPropagation()">
            <input type="text" id="cmdInput" class="cmd-input" placeholder="Search projects or commands..." autocomplete="off">
            <div class="cmd-results" id="cmdResults"></div>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
